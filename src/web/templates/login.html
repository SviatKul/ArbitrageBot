<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Вход — ArbitrageBot</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --green:#3fb950; --muted:#8b949e; }
  body { background: var(--bg); color: #e6edf3; min-height: 100vh;
         display: flex; align-items: center; justify-content: center; font-family: system-ui, sans-serif; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; width: 360px; }
  .logo { font-size: 1.5rem; font-weight: 700; color: var(--green); }
  .form-control { background: #0d1117; border-color: var(--border); color: #e6edf3; }
  .form-control:focus { background: #0d1117; border-color: var(--green); color: #e6edf3; box-shadow: 0 0 0 3px rgba(63,185,80,.15); }
  .btn-primary { background: var(--green); border: none; color: #0d1117; font-weight: 600; }
  .btn-primary:hover { background: #46d160; color: #0d1117; }
  .alert-danger { background: rgba(248,81,73,.15); border-color: #f85149; color: #f85149; }
</style>
</head>
<body>
<div class="card p-4">
  <div class="text-center mb-4">
    <div class="logo mb-1">⚡ ArbitrageBot</div>
    <div style="color:var(--muted); font-size:.9rem;">Панель управления</div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="alert alert-{{ 'danger' if cat == 'error' else cat }} py-2 mb-3" style="font-size:.9rem;">{{ msg }}</div>
  {% endfor %}
  {% endwith %}

  <form method="post" action="/login">
    <div class="mb-3">
      <label class="form-label" style="color:var(--muted); font-size:.85rem;">Логин</label>
      <input type="text" name="username" class="form-control" placeholder="username" autocomplete="username" required autofocus>
    </div>
    <div class="mb-4">
      <label class="form-label" style="color:var(--muted); font-size:.85rem;">Пароль</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Войти</button>
  </form>

  {% if show_register %}
  <hr style="border-color:var(--border); margin:1.2rem 0">
  <div class="text-center" style="font-size:.85rem; color:var(--muted);">
    Нет аккаунта? <a href="/setup" style="color:var(--green);">Создать первого пользователя</a>
  </div>
  {% endif %}
</div>
</body>
</html>
