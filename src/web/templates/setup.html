<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Первый запуск — ArbitrageBot</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --green:#3fb950; --muted:#8b949e; }
  body { background: var(--bg); color: #e6edf3; min-height: 100vh;
         display: flex; align-items: center; justify-content: center; font-family: system-ui, sans-serif; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; width: 400px; }
  .form-control { background: #0d1117; border-color: var(--border); color: #e6edf3; }
  .form-control:focus { background: #0d1117; border-color: var(--green); color: #e6edf3; box-shadow: 0 0 0 3px rgba(63,185,80,.15); }
  .btn-success { background: var(--green); border: none; color: #0d1117; font-weight: 600; }
  .btn-success:hover { background: #46d160; color: #0d1117; }
  .alert-danger { background: rgba(248,81,73,.15); border-color: #f85149; color: #f85149; }
  .badge-setup { background: rgba(63,185,80,.15); color: var(--green); border: 1px solid rgba(63,185,80,.3);
                 padding: 4px 10px; border-radius: 20px; font-size:.75rem; }
</style>
</head>
<body>
<div class="card p-4">
  <div class="text-center mb-4">
    <div style="font-size:1.5rem; font-weight:700; color:#3fb950; margin-bottom:4px;">⚡ ArbitrageBot</div>
    <span class="badge-setup">Первый запуск</span>
    <p style="color:var(--muted); font-size:.85rem; margin-top:.8rem;">
      Создайте администратора для доступа к панели управления
    </p>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="alert alert-{{ 'danger' if cat == 'error' else cat }} py-2 mb-3" style="font-size:.9rem;">{{ msg }}</div>
  {% endfor %}
  {% endwith %}

  <form method="post" action="/setup">
    <div class="mb-3">
      <label class="form-label" style="color:var(--muted); font-size:.85rem;">Логин администратора</label>
      <input type="text" name="username" class="form-control" placeholder="admin" required autofocus
             minlength="3" maxlength="32" autocomplete="username">
    </div>
    <div class="mb-3">
      <label class="form-label" style="color:var(--muted); font-size:.85rem;">Пароль</label>
      <input type="password" name="password" class="form-control" placeholder="Минимум 8 символов"
             required minlength="8" autocomplete="new-password">
    </div>
    <div class="mb-4">
      <label class="form-label" style="color:var(--muted); font-size:.85rem;">Повторите пароль</label>
      <input type="password" name="password2" class="form-control" placeholder="••••••••"
             required minlength="8" autocomplete="new-password">
    </div>
    <button type="submit" class="btn btn-success w-100">Создать аккаунт</button>
  </form>
</div>
</body>
</html>
