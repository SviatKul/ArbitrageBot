<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Логи — ArbitrageBot</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  :root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--green:#3fb950;--red:#f85149;--yellow:#d29922;--blue:#58a6ff;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;}
  .navbar{background:var(--card)!important;border-bottom:1px solid var(--border);}
  .file-item{padding:10px 16px;cursor:pointer;border-radius:8px;transition:.12s;display:flex;align-items:center;gap:10px;}
  .file-item:hover,.file-item.active{background:rgba(88,166,255,.1);color:var(--blue);}
  .file-item.active{border-left:2px solid var(--blue);}
  .file-size{color:var(--muted);font-size:.78rem;margin-left:auto;}
  #log-box{background:#010409;border:1px solid var(--border);border-radius:8px;height:calc(100vh - 280px);min-height:400px;overflow-y:auto;font-family:'JetBrains Mono','Fira Code',monospace;font-size:11.5px;padding:12px;}
  .log-line{color:#8b949e;line-height:1.5;white-space:pre-wrap;word-break:break-all;}
  .log-line.error{color:var(--red);}
  .log-line.warn{color:var(--yellow);}
  .log-line.info{color:var(--blue);}
  .log-line.success{color:var(--green);}
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
  .btn-tool{background:rgba(139,148,158,.08);color:var(--muted);border:1px solid var(--border);font-size:.82rem;padding:4px 10px;border-radius:6px;cursor:pointer;}
  .btn-tool:hover{background:rgba(139,148,158,.15);color:var(--text);}
  .line-count{color:var(--muted);font-size:.78rem;margin-left:auto;}
  input.search-box{background:#010409;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 10px;font-size:.82rem;width:200px;}
  input.search-box:focus{outline:none;border-color:var(--blue);}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container-fluid px-4">
    <span class="navbar-brand fw-bold text-white">⚡ Arbitrage Bot</span>
    <div class="d-flex gap-2">
      <a href="/" class="btn btn-sm btn-outline-secondary px-3"><i class="fas fa-home me-1"></i>Dashboard</a>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">
  <h4 class="mb-4"><i class="fas fa-terminal me-2" style="color:var(--muted);"></i>Архив логов</h4>

  <div class="row g-4">
    <!-- File list -->
    <div class="col-12 col-md-3">
      <div class="card p-3">
        <div style="font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.75rem;">
          Файлы логов
        </div>
        {% if log_files %}
        {% for f in log_files %}
        <div class="file-item {{ 'active' if loop.first }}"
             data-name="{{ f.name }}" onclick="loadLog('{{ f.name }}', this)">
          <i class="fas fa-file-alt" style="font-size:.85rem;"></i>
          <span style="font-size:.85rem;">{{ f.name }}</span>
          <span class="file-size">{{ (f.size / 1024)|round(1) }}KB</span>
        </div>
        {% endfor %}
        {% else %}
        <div class="empty-state py-4">
          <div>Логов нет</div>
          <div style="font-size:.82rem;margin-top:.3rem;">Запусти бота</div>
        </div>
        {% endif %}
      </div>
    </div>

    <!-- Log viewer -->
    <div class="col-12 col-md-9">
      <div class="card p-4">
        <div class="toolbar">
          <input type="text" class="search-box" id="searchBox" placeholder="Поиск…" oninput="filterLines()">
          <select id="levelFilter" class="btn-tool" style="cursor:pointer;" onchange="filterLines()">
            <option value="">Все уровни</option>
            <option value="ERROR">ERROR</option>
            <option value="WARNING">WARNING</option>
            <option value="INFO">INFO</option>
            <option value="SUCCESS">SUCCESS</option>
          </select>
          <button class="btn-tool" onclick="scrollBottom()"><i class="fas fa-arrow-down me-1"></i>В конец</button>
          <button class="btn-tool" onclick="loadCurrentLog()"><i class="fas fa-sync me-1"></i>Обновить</button>
          <span class="line-count" id="lineCount"></span>
        </div>
        <div id="log-box">
          {% if log_files %}
          <div style="color:var(--muted);font-size:.85rem;">Загрузка…</div>
          {% else %}
          <div style="color:var(--muted);">Нет логов для отображения.</div>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let currentFile = '{{ log_files[0].name if log_files else "" }}';
let allLines = [];

function classifyLine(line) {
  if (line.includes('| ERROR') || line.includes('| CRITICAL')) return 'error';
  if (line.includes('| WARNING')) return 'warn';
  if (line.includes('| INFO')) return 'info';
  if (line.includes('SUCCESS') || line.includes('✅')) return 'success';
  return '';
}

function filterLines() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const level  = document.getElementById('levelFilter').value.toUpperCase();
  const box    = document.getElementById('log-box');
  let visible  = 0;

  const lineEls = box.querySelectorAll('.log-line');
  lineEls.forEach(el => {
    const text = el.textContent;
    const levelMatch = !level || text.toUpperCase().includes('| ' + level);
    const searchMatch = !search || text.toLowerCase().includes(search);
    el.style.display = (levelMatch && searchMatch) ? '' : 'none';
    if (levelMatch && searchMatch) visible++;
  });
  document.getElementById('lineCount').textContent = `${visible} / ${allLines.length} строк`;
}

async function loadLog(name, el) {
  currentFile = name;
  document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');

  const box = document.getElementById('log-box');
  box.innerHTML = '<div style="color:var(--muted);">Загрузка…</div>';

  try {
    const r = await fetch(`/api/logs/file?name=${encodeURIComponent(name)}&n=500`);
    const d = await r.json();
    allLines = d.lines || [];
    renderLines(allLines);
    filterLines();
    scrollBottom();
  } catch(e) {
    box.innerHTML = `<div style="color:var(--red);">Ошибка: ${e}</div>`;
  }
}

function renderLines(lines) {
  const box = document.getElementById('log-box');
  box.innerHTML = lines.map(line => {
    const cls = classifyLine(line);
    const safe = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="log-line ${cls}">${safe}</div>`;
  }).join('');
  document.getElementById('lineCount').textContent = `${lines.length} строк`;
}

function scrollBottom() {
  const box = document.getElementById('log-box');
  box.scrollTop = box.scrollHeight;
}

function loadCurrentLog() {
  if (currentFile) loadLog(currentFile, document.querySelector('.file-item.active'));
}

// Initial load
if (currentFile) loadLog(currentFile, null);
</script>
</body>
</html>
