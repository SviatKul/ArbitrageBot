<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Смена пароля — ArbitrageBot</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --green:#3fb950; --muted:#8b949e; --red:#f85149; }
  body { background:var(--bg); color:#e6edf3; min-height:100vh;
         display:flex; align-items:center; justify-content:center; font-family:system-ui,sans-serif; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:14px; width:400px; }
  .form-control { background:#010409; border-color:var(--border); color:#e6edf3; }
  .form-control:focus { background:#010409; border-color:var(--green); color:#e6edf3; box-shadow:0 0 0 3px rgba(63,185,80,.15); }
  .form-label { color:var(--muted); font-size:.85rem; margin-bottom:4px; }
  .btn-primary { background:var(--green); border:none; color:#0d1117; font-weight:600; }
  .btn-primary:hover { background:#46d160; color:#0d1117; }
  .alert-danger  { background:rgba(248,81,73,.12); border-color:var(--red); color:var(--red); }
  .alert-success { background:rgba(63,185,80,.12); border-color:var(--green); color:var(--green); }
  .strength-bar { height:4px; border-radius:2px; transition:width .3s,background .3s; }
  .eye-btn { cursor:pointer; background:#010409; border-color:var(--border); color:var(--muted); }
  .eye-btn:hover { color:#e6edf3; background:#010409; border-color:var(--border); }
</style>
</head>
<body>
<div class="card p-4">
  <div class="text-center mb-4">
    <div style="font-size:1.4rem;font-weight:700;color:var(--green);">⚡ ArbitrageBot</div>
    <div style="color:var(--muted);font-size:.85rem;margin-top:4px;">
      <i class="fas fa-lock me-1"></i>Смена пароля · <strong style="color:#e6edf3">{{ current_user.username }}</strong>
    </div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="alert alert-{{ 'danger' if cat == 'error' else 'success' }} py-2 mb-3" style="font-size:.9rem;">
    <i class="fas fa-{{ 'exclamation-circle' if cat == 'error' else 'check-circle' }} me-2"></i>{{ msg }}
  </div>
  {% endfor %}
  {% endwith %}

  <form method="post" action="/change-password" id="pw-form">
    <div class="mb-3">
      <label class="form-label">Текущий пароль</label>
      <div class="input-group">
        <input type="password" name="old_password" id="old_pw" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        <button type="button" class="btn eye-btn" onclick="togglePw('old_pw', this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Новый пароль</label>
      <div class="input-group">
        <input type="password" name="new_password" id="new_pw" class="form-control" placeholder="Минимум 8 символов"
               required minlength="8" autocomplete="new-password" oninput="checkStrength(this.value)">
        <button type="button" class="btn eye-btn" onclick="togglePw('new_pw', this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
      <div class="mt-2 px-1">
        <div style="background:rgba(255,255,255,.07);border-radius:2px;height:4px;">
          <div id="strength-bar" class="strength-bar" style="width:0%;background:var(--red)"></div>
        </div>
        <div id="strength-label" style="font-size:.75rem;color:var(--muted);margin-top:4px;"></div>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label">Повторите новый пароль</label>
      <div class="input-group">
        <input type="password" name="confirm_password" id="confirm_pw" class="form-control" placeholder="••••••••"
               required minlength="8" autocomplete="new-password" oninput="checkMatch()">
        <button type="button" class="btn eye-btn" onclick="togglePw('confirm_pw', this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
      <div id="match-label" style="font-size:.75rem;margin-top:4px;"></div>
    </div>

    <button type="submit" class="btn btn-primary w-100 mb-3">
      <i class="fas fa-key me-2"></i>Изменить пароль
    </button>
    <a href="/" class="btn btn-outline-secondary w-100" style="color:var(--muted);">
      <i class="fas fa-arrow-left me-2"></i>Вернуться на дашборд
    </a>
  </form>
</div>

<script>
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const icon = btn.querySelector('i');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'fas fa-eye';
  }
}

function checkStrength(pw) {
  const bar = document.getElementById('strength-bar');
  const lbl = document.getElementById('strength-label');
  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const map = [
    [0,   '0%',   '#f85149', ''],
    [1,   '20%',  '#f85149', 'Очень слабый'],
    [2,   '40%',  '#d29922', 'Слабый'],
    [3,   '60%',  '#d29922', 'Средний'],
    [4,   '80%',  '#3fb950', 'Хороший'],
    [5,  '100%',  '#3fb950', 'Отличный'],
  ];
  const [, w, c, t] = map[Math.min(score, 5)];
  bar.style.width = w;
  bar.style.background = c;
  lbl.textContent = t;
  lbl.style.color = c;
}

function checkMatch() {
  const a = document.getElementById('new_pw').value;
  const b = document.getElementById('confirm_pw').value;
  const lbl = document.getElementById('match-label');
  if (!b) { lbl.textContent = ''; return; }
  if (a === b) {
    lbl.textContent = '✓ Пароли совпадают';
    lbl.style.color = '#3fb950';
  } else {
    lbl.textContent = '✗ Пароли не совпадают';
    lbl.style.color = '#f85149';
  }
}
</script>
</body>
</html>
