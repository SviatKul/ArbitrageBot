<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Регистрация — ArbitrageBot</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --green:#3fb950; --muted:#8b949e; }
  body { background:var(--bg); color:#e6edf3; min-height:100vh;
         display:flex; align-items:center; justify-content:center; font-family:system-ui,sans-serif; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; width:380px; }
  .logo { font-size:1.5rem; font-weight:700; color:var(--green); }
  .form-control { background:#0d1117; border-color:var(--border); color:#e6edf3; }
  .form-control:focus { background:#0d1117; border-color:var(--green); color:#e6edf3; box-shadow:0 0 0 3px rgba(63,185,80,.15); }
  .btn-primary { background:var(--green); border:none; color:#0d1117; font-weight:600; }
  .btn-primary:hover { background:#46d160; color:#0d1117; }
  .alert-danger { background:rgba(248,81,73,.15); border-color:#f85149; color:#f85149; }
</style>
</head>
<body>
<div class="card p-4">
  <div class="text-center mb-4">
    <div class="logo mb-1">⚡ ArbitrageBot</div>
    <div style="color:var(--muted); font-size:.9rem;">Создать аккаунт</div>
  </div>

  {% if error %}
  <div class="alert alert-danger py-2 mb-3" style="font-size:.9rem;">{{ error }}</div>
  {% endif %}

  <form method="post">
    <div class="mb-3">
      <label class="form-label" style="color:var(--muted); font-size:.85rem;">Логин</label>
      <input type="text" name="username" class="form-control" placeholder="username"
             autocomplete="username" required autofocus minlength="3">
    </div>
    <div class="mb-3">
      <label class="form-label" style="color:var(--muted); font-size:.85rem;">Пароль</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••"
             autocomplete="new-password" required minlength="6">
    </div>
    <div class="mb-4">
      <label class="form-label" style="color:var(--muted); font-size:.85rem;">Повторите пароль</label>
      <input type="password" name="confirm" class="form-control" placeholder="••••••••"
             autocomplete="new-password" required minlength="6">
    </div>
    <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
  </form>

  <hr style="border-color:var(--border); margin:1.2rem 0">
  <div class="text-center" style="font-size:.85rem; color:var(--muted);">
    Уже есть аккаунт? <a href="/login" style="color:var(--green);">Войти</a>
  </div>
</div>
</body>
</html>
